<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRIAGE Personnel Assessment</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background:
        radial-gradient(circle at center, #1a1a1a 0%, #080808 65%);
    color: #eeeeee;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 720px;
    background: rgba(15, 15, 15, 0.96);
    border: 1px solid #3a3a3a;
    padding: 30px;
    box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        inset 0 0 30px rgba(255, 255, 255, 0.02);
}

.header {
    text-align: center;
    border-bottom: 1px solid #3a3a3a;
    padding-bottom: 25px;
    margin-bottom: 30px;
}

.uco-logo {
    width: 60px;
    height: 60px;
    object-fit: contain;
    display: block;
    margin: 0 auto 15px auto;
}

.triage-logo {
    width: 200px;
    height: 200px;
    object-fit: contain;
    display: block;
    margin: 25px auto 15px auto;
}

.umbrella {
    font-size: 12px;
    letter-spacing: 5px;
    color: #777777;
    margin-bottom: 15px;
    text-transform: uppercase;
}
   
.faction-video {
    width: 100%;
    max-width: 260px;
    height: auto;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    margin: 25px auto;
    border: 1px solid #3a3a3a;
}

h1 {
    margin: 0;
    color: #d40000;
    font-size: 42px;
    letter-spacing: 8px;
    font-weight: 700;
    text-shadow:
        0 0 10px rgba(212, 0, 0, 0.4);
}

.subtitle {
    margin-top: 12px;
    color: #888888;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

#quiz {
    width: 100%;
}

.question-number {
    color: #d40000;
    font-size: 12px;
    letter-spacing: 3px;
    font-weight: bold;
    margin-bottom: 18px;
    text-transform: uppercase;
}

.question {
    font-size: 23px;
    line-height: 1.4;
    font-weight: bold;
    margin-bottom: 25px;
    color: #f0f0f0;
}

.answers {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.answer {
    width: 100%;
    padding: 17px 20px;
    background: #161616;
    border: 1px solid #3a3a3a;
    color: #dddddd;
    text-align: left;
    font-size: 15px;
    line-height: 1.45;
    cursor: pointer;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        transform 0.2s ease,
        color 0.2s ease;
}

.answer:hover {
    background: #241010;
    border-color: #d40000;
    color: #ffffff;
    transform: translateX(4px);
}

.answer:active {
    transform: translateX(2px);
    background: #3a0b0b;
}

@media (max-width: 600px) {

    body {
        padding: 10px;
        align-items: flex-start;
        padding-top: 20px;
    }

    .container {
        padding: 22px 18px;
    }

    h1 {
        font-size: 32px;
        letter-spacing: 6px;
    }

    .umbrella {
        font-size: 10px;
        letter-spacing: 3px;
    }

    .subtitle {
        font-size: 10px;
        letter-spacing: 2px;
    }

    .question {
        font-size: 20px;
    }

    .answer {
        padding: 16px;
        font-size: 14px;
    }

}

</style>
</head>

<body>

<div class="header">

    <img
        src="uco-logo.png"
        alt="Umbrella Corporation Ostrava"
        class="uco-logo"
    >

    <div class="umbrella">
        UMBRELLA CORPORATION OSTRAVA
    </div>

    <img
        src="triage-logo.png"
        alt="TRIAGE"
        class="triage-logo"
    >

    <h1>T.R.I.A.G.E.</h1>

    <div class="subtitle">
        PERSONNEL ASSESSMENT SYSTEM
    </div>

</div>
<div id="quiz">

    <div class="question-number">
        OTÁZKA 1 / 8
    </div>

    <div class="question">
        Máš 15 minut do startu nebezpečné mise. Co si dáš k obědu?
    </div>

    <div class="answers">

       <button class="answer" onclick="answerSelected('STARS')">
            Skočím si do bistra na pořádný burger s týmem, potřebuju energii.
        </button>

       <button class="answer" onclick="answerSelected('UBCS')">
            Vezmu první balíček MRE, co najdu ve skladu, a otevřu ho za chůze.
        </button>

      <button class="answer" onclick="answerSelected('USS')">
            Nepotřebuju jíst, napiju se vody a zkontroluju si zásobníky.
        </button>

       <button class="answer" onclick="answerSelected('SPECOPS')">
            Dám si silné espresso a sendvič, musím být ve střehu kvůli novým rozkazům.
        </button>

    </div>

</div>
    <script>

let scores = {
    STARS: 0,
    USS: 0,
    UBCS: 0,
    SPECOPS: 0
};

let currentQuestion = 1;

function answerSelected(faction) {

    scores[faction]++;

    if (currentQuestion === 1) {

        currentQuestion = 2;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 2 / 8
            </div>

            <div class="question">
                Jaké je zvíře z uvedených, tě nejlépe vystihuje?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('STARS')">
                    Orel
                </button>

                <button class="answer" onclick="answerSelected('UBCS')">
                    Vlčák
                </button>

                <button class="answer" onclick="answerSelected('USS')">
                    Sova
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Chameleon
                </button>

            </div>

        `;

    } else if (currentQuestion === 2) {

        currentQuestion = 3;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 3 / 8
            </div>

            <div class="question">
                Jaké znamení je vám nejsympatičtější?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('UBCS')">
                    Oheň
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Vzduch
                </button>

                <button class="answer" onclick="answerSelected('STARS')">
                    Voda
                </button>

                <button class="answer" onclick="answerSelected('USS')">
                    Země
                </button>

            </div>

        `;

    } else if (currentQuestion === 3) {

        currentQuestion = 4;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 4 / 8
            </div>

            <div class="question">
                Jaké roční období nejlépe vystihuje tvou povahu?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('STARS')">
                    Jaro
                </button>

                <button class="answer" onclick="answerSelected('UBCS')">
                    Léto
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Podzim
                </button>

                <button class="answer" onclick="answerSelected('USS')">
                    Zima
                </button>

            </div>

        `;

    } else if (currentQuestion === 4) {

        currentQuestion = 5;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 5 / 8
            </div>

            <div class="question">
                Jaká barva se vám z těchto líbí nejvíce?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('STARS')">
                    Zelená
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Modrá
                </button>

                <button class="answer" onclick="answerSelected('UBCS')">
                    Žlutá
                </button>

                <button class="answer" onclick="answerSelected('USS')">
                    Červená
                </button>

            </div>

        `;

    } else if (currentQuestion === 5) {

        currentQuestion = 6;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 6 / 8
            </div>

            <div class="question">
                Která z těchto povah vás nejvíce vystihuje?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('USS')">
                    Tichý
                </button>

                <button class="answer" onclick="answerSelected('STARS')">
                    Spolehlivý
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Vůdčí
                </button>

                <button class="answer" onclick="answerSelected('UBCS')">
                    Aktivní
                </button>

            </div>

        `;

    } else if (currentQuestion === 6) {

        currentQuestion = 7;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 7 / 8
            </div>

            <div class="question">
                Jaký typ dovolené je pro vás nejvíce ideální?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('USS')">
                    Sám se toulat v přírodě
                </button>

                <button class="answer" onclick="answerSelected('STARS')">
                    S partnerem nebo s kamarádkou někam na wellness nebo někam po Česku
                </button>

                <button class="answer" onclick="answerSelected('UBCS')">
                    Někam k moři, kde je kombinace party a klidného odpočinku
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Aktivní dovolená, kde člověk chodí celý den po památkách a večer je společenský program
                </button>

            </div>

        `;

    } else if (currentQuestion === 7) {

        currentQuestion = 8;

        document.getElementById("quiz").innerHTML = `

            <div class="question-number">
                OTÁZKA 8 / 8
            </div>

            <div class="question">
                Jak si představujete ideální páteční večer?
            </div>

            <div class="answers">

                <button class="answer" onclick="answerSelected('USS')">
                    S knihou v ruce, v teple domova, kde budete jen vy
                </button>

                <button class="answer" onclick="answerSelected('SPECOPS')">
                    Stáhnete si film a koupíte si něco dobrého k jídlu
                </button>

                <button class="answer" onclick="answerSelected('STARS')">
                    Pozvete si k sobě domů partu kamarádů, se kterými si budete povídat, jíst a hrát společenské hry
                </button>

                <button class="answer" onclick="answerSelected('UBCS')">
                    Vyrazíte na party, ze které přijdete až druhý den brzo ráno
                </button>

            </div>

        `;

    } else if (currentQuestion === 8) {

        showResult();

    }

}


function showResult() {

    let maxScore = Math.max(
        scores.STARS,
        scores.USS,
        scores.UBCS,
        scores.SPECOPS
    );

    let winners = [];

    for (let faction in scores) {

        if (scores[faction] === maxScore) {
            winners.push(faction);
        }

    }

    let recommendation = "";
    let resultTitle = "";
    let resultText = "";

    if (winners.length === 1) {

        recommendation = winners[0];

        if (winners[0] === "STARS") {

            resultTitle = "OCHRÁNCE A SRDCAŘ";

            resultText = "Jsi spolehlivý lídr, který by pro svůj tým obětoval všechno. Máš silný morální kompas a i v naprostém chaosu Raccoon City si zachováváš lidskost a touhu pomáhat.";

        } else if (winners[0] === "USS") {

            resultTitle = "CHLADNOKREVNÝ SMRŤÁK";

            resultText = "Emoce jdou stranou, zajímá tě jen výsledek. Jsi extrémně tichý, precizní a loajální misi. Nejsi tu od toho, abys tvořil přátelství, ale abys splnil úkol s maximální efektivitou.";

        } else if (winners[0] === "UBCS") {

            resultTitle = "PŘEŽIVŠÍ ŽOLDÁK";

            resultText = "Žiješ okamžikem a dokážeš neuvěřitelně rychle improvizovat. Neřešíš vysokou politiku korporací, jde ti o přežití a o to, dostat se z problému živý a s co nejmenšími ztrátami. Jsi mistr chaosu.";

        } else if (winners[0] === "SPECOPS") {

            resultTitle = "VLÁDNÍ STRATÉG A ČISTIČ";

            resultText = "Rád taháš za nitky. Jsi profesionál, který vidí svět v souvislostech a datech. Záleží ti na struktuře, pravidlech a kontrole nad informacemi. Tvá zbraň je tvůj intelekt a schopnost manipulovat situací.";

        }

    } else {

        recommendation = winners.join(" / ");

        if (winners.length === 2) {

            let pair = winners.sort().join("-");

            if (pair === "STARS-USS") {

                resultTitle = "RACIONÁLNÍ HRDINA";

                resultText = "Stojíš na pomezí světla a temnoty. Chceš chránit ostatní a dělat správné věci, ale neváháš k tomu použít brutální, chladnokrevnou efektivitu bez špetky slitování.";

            } else if (pair === "STARS-UBCS") {

                resultTitle = "OSTŘÍLENÝ PŘEŽIVŠÍ";

                resultText = "Máš dobré srdce, ale ulice tě naučila tvrdosti. Funguješ nejlépe v týmu, ale umíš improvizovat, porušovat pravidla a žít ze dne na den.";

            } else if (pair === "SPECOPS-STARS") {

                resultTitle = "TAJNÝ AGENT S MORÁLKOU";

                resultText = "Jsi člověk systému, ale s vlastním svědomím. Ctíš pravidla a hierarchii, ale když zjistíš, že tví šéfové hrají špinavou hru, neváháš jednat na vlastní pěst.";

            } else if (pair === "UBCS-USS") {

                resultTitle = "DOKONALÝ VOJÁK";

                resultText = "Jsi ultimátní žoldák. Z U.B.C.S. máš schopnost přežít v jakémkoliv terénu a z U.S.S. sis vzal absolutní disciplínu.";

            } else if (pair === "SPECOPS-USS") {

                resultTitle = "STÍNOVÝ OPERATIVEc";

                resultText = "Operuješ výhradně za oponou. Sbíráš informace, mažeš důkazy a potichu eliminuješ hrozby. Jsi analytik a operativec v jednom.";

            } else if (pair === "SPECOPS-UBCS") {

                resultTitle = "TAKTICKÝ OPORTUNISTA";

                resultText = "Umíš využívat strukturu a zdroje, ale uvnitř jsi volnomyšlenkář. Když se situace zvrtne, kašleš na protokoly a přecházíš do módu žoldáka.";

            }

        } else if (winners.length === 4) {

            recommendation = "NEZÁVISLÁ PROMĚNNÁ";

            resultTitle = "NEZÁVISLÁ PROMĚNNÁ";

            resultText = "Jsi naprostý chameleón. Nemáš pevnou loajalitu k žádné straně, protože dokážeš perfektně číst situaci a přizpůsobit se jí. Nedáš se zaškatulkovat.";

        } else {

            resultTitle = "NEZAŘADITELNÝ OPERATIVEc";

            resultText = "Výsledky ukazují na kombinaci několika frakcí. Nejsi jednoduchý případ a tvůj herní styl nelze jednoznačně zařadit.";

        }

    }

    let recommendationText = "";

    if (winners.length === 1) {

        if (recommendation === "STARS") {
            recommendationText = "S.T.A.R.S.";
        } else if (recommendation === "USS") {
            recommendationText = "U.S.S.";
        } else if (recommendation === "UBCS") {
            recommendationText = "U.B.C.S.";
        } else if (recommendation === "SPECOPS") {
            recommendationText = "SPEC OPS";
        }

    } else {

        recommendationText = winners.map(function(faction) {
            if (faction === "STARS") return "S.T.A.R.S."; 
            if (faction === "USS") return "U.S.S."; 
            if (faction === "UBCS") return "U.B.C.S."; 
            if (faction === "SPECOPS") return "SPEC OPS"; 
        
        }).join(" / "); 
    
    } 
    
    let videoHTML = ""; 
    
    if (winners.includes("USS")) { 
        
        videoHTML = ` 
        <video 
        class="faction-video"
        autoplay
        loop
        playsinline
        controls 
        
        > 
        <source src="uss_1.mp4" type="video/mp4"> Váš prohlížeč nepodporuje video.
        </video> 
        `; 
    
    } 
    
    document.getElementById("quiz").innerHTML = ` 
    
    <div class="question-number"> 
    DOPORUČENÍ: ${recommendationText} 
    </div> 
    ${videoHTML} 
    <div class="question"> 
    ${resultTitle} 
    </div> 
    <div style="margin-top: 20px; line-height: 1.7; color: #bbbbbb;"> 
    ${resultText} 
    </div>
    `;

}

</script>
</body>
</html>
